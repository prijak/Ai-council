    <!-- ── Service Worker registration ──────────────────────── -->
    <script>
      if ("serviceWorker" in navigator) {
        // In dev (Vite), the SW must NOT run — it intercepts /@vite/ and
        // WebSocket HMR requests, causing blank page on soft refresh.
        const isDev = location.hostname === "localhost" || location.hostname === "127.0.0.1";
        if (isDev) {
          // Unregister any previously installed SW so stale caches don't linger
          navigator.serviceWorker.getRegistrations().then((regs) => {
            regs.forEach((reg) => {
              reg.unregister();
              console.log("[PWA] SW unregistered in dev mode");
            });
          });
        } else {
          window.addEventListener("load", () => {
            navigator.serviceWorker
              .register("/sw.js")
              .then((reg) => console.log("[PWA] SW registered:", reg.scope))
              .catch((err) => console.warn("[PWA] SW registration failed:", err));
          });
        }
      }
    </script>
